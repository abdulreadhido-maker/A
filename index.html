<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mega Tech Store</title>

<style>

/* ===== BODY ===== */
body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
overflow-x:hidden;
}

/* ===== HEADER ===== */
header{
position:sticky;
top:0;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 25px;
background:#0f172a;
box-shadow:0 5px 20px rgba(0,0,0,0.5);
z-index:1000;
}

.logo{
font-size:24px;
font-weight:bold;
color:#38bdf8;
}

nav{
display:flex;
gap:15px;
}

nav a{
color:white;
text-decoration:none;
font-size:14px;
transition:0.3s;
}

nav a:hover{
color:#38bdf8;
}

/* ===== SEARCH ===== */
.search{
padding:8px;
border-radius:10px;
border:none;
outline:none;
width:180px;
}

/* ===== CART ===== */
.cart{
background:#38bdf8;
padding:8px 12px;
border-radius:10px;
color:black;
font-weight:bold;
}

/* ===== HERO ===== */
.hero{
height:80vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;

background:
linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),
url('https://images.unsplash.com/photo-1518770660439-4636190af475');

background-size:cover;
background-position:center;
}

.hero h1{
font-size:60px;
margin:0;
color:#38bdf8;
}

.hero p{
max-width:600px;
color:#cbd5e1;
line-height:1.6;
}

.btn{
margin-top:20px;
padding:12px 25px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
background:#38bdf8;
color:black;
transition:0.3s;
}

.btn:hover{
transform:scale(1.05);
}

/* ===== PRODUCTS ===== */
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
gap:20px;
padding:40px;
}

.card{
background:#111827;
padding:15px;
border-radius:15px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,0.4);
transition:0.3s;
}

.card:hover{
transform:translateY(-8px);
}

.card img{
width:100%;
height:160px;
object-fit:cover;
border-radius:10px;
}

.buy{
margin-top:10px;
padding:10px;
width:100%;
border:none;
border-radius:10px;
background:#22c55e;
color:white;
cursor:pointer;
}

/* ===== NOTIFICATION ===== */
#notify{
position:fixed;
top:20px;
right:20px;
background:#22c55e;
padding:15px 20px;
border-radius:10px;
display:none;
font-weight:bold;
}

/* ===== CART BOX ===== */
.cart-box{
position:fixed;
bottom:20px;
right:20px;
background:#0f172a;
padding:15px;
border-radius:15px;
width:250px;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

.cart-item{
font-size:14px;
border-bottom:1px solid #1f2937;
padding:5px 0;
}

</style>

</head>

<body>

<!-- ===== HEADER ===== -->
<header>
<div class="logo">⚡ Mega Tech</div>

<nav>
<a href="#">الرئيسية</a>
<a href="#">العروض</a>
<a href="#">الأجهزة</a>
<a href="#">Gaming</a>
</nav>

<div style="display:flex;gap:10px;align-items:center;">
<input class="search" placeholder="ابحث...">
<div class="cart">🛒 <span id="count">0</span></div>
</div>
</header>

<!-- ===== HERO ===== -->
<section class="hero">
<h1>متجر تقني احترافي</h1>
<p>أفضل الأجهزة الإلكترونية والتقنية الحديثة بأسعار منافسة وتجربة تسوق ممتعة</p>
<button class="btn">ابدأ التسوق</button>
</section>

<!-- ===== PRODUCTS ===== -->
<section class="products">

<div class="card">
<img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9">
<h3>iPhone 15</h3>
<p>4500 ريال</p>
<button class="buy" onclick="add('iPhone 15')">شراء</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1517336714731-489689fd1ca8">
<h3>MacBook Pro</h3>
<p>8500 ريال</p>
<button class="buy" onclick="add('MacBook Pro')">شراء</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1606813907291-d86efa9b94db">
<h3>PlayStation 5</h3>
<p>2200 ريال</p>
<button class="buy" onclick="add('PS5')">شراء</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff">
<h3>Nike Shoes</h3>
<p>700 ريال</p>
<button class="buy" onclick="add('Nike Shoes')">شراء</button>
</div>

</section>

<!-- ===== CART ===== -->
<div class="cart-box">
<h3>🛒 السلة</h3>
<div id="cartList"></div>
</div>

<!-- ===== NOTIFY ===== -->
<div id="notify">تمت الإضافة 🛒</div>

<!-- ===== SCRIPT ===== -->
<script>

let cart = {};

function add(item){

if(cart[item]){
cart[item]++;
} else {
cart[item]=1;
}

render();
notify();
}

function render(){

let list = document.getElementById("cartList");
list.innerHTML="";

let count = 0;

for(let i in cart){

count += cart[i];

let div = document.createElement("div");
div.className="cart-item";
div.innerHTML = i + " × " + cart[i];
list.appendChild(div);

}

document.getElementById("count").innerText = count;

}

function notify(){
let n = document.getElementById("notify");
n.style.display="block";

setTimeout(()=>{
n.style.display="none";
},1500);
}

</script>

</body>
</html>
