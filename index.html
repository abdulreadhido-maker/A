<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Store UI</title>

<style>

/* ===== BASE ===== */
*{box-sizing:border-box}
body{
margin:0;
font-family:Arial;
background:#070b14;
color:white;
}

/* ===== HEADER ===== */
header{
position:sticky;
top:0;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 25px;
background:#0b1220;
border-bottom:1px solid #1f2937;
z-index:1000;
}

.logo{
font-size:20px;
font-weight:bold;
color:#38bdf8;
}

nav{
display:flex;
gap:15px;
}

nav a{
color:white;
text-decoration:none;
font-size:14px;
opacity:0.8;
transition:0.3s;
}

nav a:hover{
opacity:1;
color:#38bdf8;
}

/* ===== LAYOUT ===== */
.container{
display:flex;
gap:20px;
padding:20px;
}

/* ===== PRODUCTS ===== */
.products{
flex:3;
}

.section-title{
font-size:22px;
margin:20px 0 10px;
color:#38bdf8;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
}

.card{
background:#0f172a;
border:1px solid #1f2937;
border-radius:15px;
overflow:hidden;
transition:0.3s;
}

.card:hover{
transform:translateY(-8px);
border-color:#38bdf8;
}

.card img{
width:100%;
height:150px;
object-fit:cover;
}

.card-body{
padding:10px;
text-align:center;
}

.price{
color:#22c55e;
margin:5px 0;
}

.card button{
width:100%;
padding:10px;
border:none;
border-radius:10px;
background:#22c55e;
color:white;
cursor:pointer;
}

/* ===== CART (RIGHT SIDEBAR) ===== */
.cart{
flex:1;
background:#0b1220;
border:1px solid #1f2937;
border-radius:15px;
padding:15px;
height:fit-content;
position:sticky;
top:80px;
}

.cart h3{
margin-top:0;
color:#38bdf8;
}

.item{
font-size:13px;
padding:5px 0;
border-bottom:1px solid #1f2937;
}

/* ===== HERO ===== */
.hero{
padding:60px 20px;
text-align:center;
background:
linear-gradient(rgba(0,0,0,0.7),rgba(0,0,0,0.7)),
url('https://images.unsplash.com/photo-1522199755839-a2bacb67c546');
background-size:cover;
background-position:center;
}

.hero h1{
font-size:45px;
color:#38bdf8;
}

.hero p{
color:#cbd5e1;
max-width:600px;
margin:auto;
}

/* ===== NOTIFY ===== */
#notify{
position:fixed;
top:20px;
right:20px;
background:#22c55e;
padding:10px 15px;
border-radius:10px;
display:none;
}

</style>
</head>

<body>

<header>
<div class="logo">⚡ Pro Store</div>

<nav>
<a href="#phones">جوالات</a>
<a href="#laptops">لابتوبات</a>
<a href="#gaming">ألعاب</a>
</nav>
</header>

<section class="hero">
<h1>متجر احترافي كامل</h1>
<p>واجهة متجر حديثة مثل الشركات الكبرى + تصميم أنيق وسلة جانبية</p>
</section>

<div class="container">

<!-- PRODUCTS -->
<div class="products">

<h2 class="section-title" id="phones">📱 الجوالات</h2>

<div class="grid">

<div class="card">
<img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9">
<div class="card-body">
<h3>iPhone 15</h3>
<div class="price">4500 ريال</div>
<button onclick="add('iPhone 15')">شراء</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1598327105666-5b89351aff97">
<div class="card-body">
<h3>Samsung S24</h3>
<div class="price">3800 ريال</div>
<button onclick="add('Samsung S24')">شراء</button>
</div>
</div>

</div>

<h2 class="section-title" id="laptops">💻 لابتوبات</h2>

<div class="grid">

<div class="card">
<img src="https://images.unsplash.com/photo-1517336714731-489689fd1ca8">
<div class="card-body">
<h3>MacBook Pro</h3>
<div class="price">8500 ريال</div>
<button onclick="add('MacBook Pro')">شراء</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1527443154391-507e9dc6c5cc">
<div class="card-body">
<h3>Dell XPS</h3>
<div class="price">6200 ريال</div>
<button onclick="add('Dell XPS')">شراء</button>
</div>
</div>

</div>

</div>

<!-- CART -->
<div class="cart">
<h3>🛒 السلة</h3>
<div id="list"></div>
</div>

</div>

<!-- NOTIFY -->
<div id="notify">تمت الإضافة</div>

<script>

let cart = {};

function add(item){

if(cart[item]) cart[item]++;
else cart[item]=1;

render();
show();

}

function render(){

let list = document.getElementById("list");
list.innerHTML="";

for(let i in cart){
let div = document.createElement("div");
div.className="item";
div.innerHTML = i + " × " + cart[i];
list.appendChild(div);
}

}

function show(){
let n = document.getElementById("notify");
n.style.display="block";
setTimeout(()=>n.style.display="none",1200);
}

</script>

</body>
</html>
