<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mega Store</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOADING -->
<div id="loading">
  <h1>Mega Store</h1>
  <div class="loader"></div>
</div>

<!-- LOGIN -->
<div id="loginBox">
  <div class="loginCard">
    <h2>Admin Login</h2>
    <input id="pass" type="password" placeholder="Password">
    <button onclick="login()">دخول</button>
  </div>
</div>

<header>
  <div class="logo" onclick="showPage('home')">Mega Store</div>

  <nav>
    <a onclick="showPage('home')">الرئيسية</a>
    <a onclick="showPage('products')">المنتجات</a>
    <a onclick="showPage('adminPanel')">لوحة الإدارة</a>
  </nav>

  <div class="right">
    <input class="search" placeholder="ابحث...">
    <div class="cart" onclick="toggleCart()">
      🛒 <span id="cartCount">0</span>
    </div>
  </div>
</header>

<div class="container">

<!-- HOME -->
<div id="home" class="page active">
  <section class="hero">
    <h1>متجر احترافي</h1>
    <p>تجربة تسوق حديثة</p>
    <button class="btn" onclick="showPage('products')">ابدأ</button>
  </section>
</div>

<!-- PRODUCTS -->
<div id="products" class="page">
  <h2 class="section-title">المنتجات</h2>
  <div class="grid" id="productList"></div>
</div>

<!-- PRODUCT PAGE -->
<div id="productPage"></div>

<!-- ADMIN -->
<div id="adminPanel" class="page">
  <h2 class="section-title">لوحة الإدارة</h2>

  <div class="adminBox">
    <input id="name" placeholder="اسم المنتج">
    <input id="price" placeholder="السعر">
    <input id="img" placeholder="الصورة">
    <button onclick="addProduct()">إضافة</button>

    <div id="adminList"></div>
  </div>
</div>

</div>

<!-- CART -->
<div class="cartPanel" id="cartPanel">
  <h2>السلة</h2>
  <div id="cartItems"></div>
  <button class="checkout">الدفع</button>
</div>

<footer>© 2026 Mega Store</footer>

<script src="script.js"></script>
</body>
</html>
