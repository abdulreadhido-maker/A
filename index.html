
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mega Store</title>

<style>
body{
margin:0;
font-family:Arial;
background:radial-gradient(circle at top,#0f172a,#020617);
color:white;
overflow-x:hidden;
}

/* ===== GLOBAL WRAPPER (bigger spacing) ===== */
.container{
max-width:1300px;
margin:auto;
padding:0 20px;
}

/* ===== LOADING SCREEN ===== */
#loading{
position:fixed;
width:100%;height:100%;
background:#020617;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:9999;
transition:0.8s;
}

.loader{
width:70px;height:70px;
border:6px solid #1e293b;
border-top:6px solid #38bdf8;
border-radius:50%;
animation:spin 1s linear infinite;
margin-top:20px;
}
@keyframes spin{100%{transform:rotate(360deg);}}

/* ===== PAGE TRANSITION OVERLAY ===== */
#pageLoader{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(2,6,23,0.9);
display:none;
justify-content:center;
align-items:center;
z-index:9000;
backdrop-filter:blur(8px);
}

#pageLoader span{
width:60px;height:60px;
border-radius:50%;
border:5px solid #1e293b;
border-top:5px solid #22c55e;
animation:spin 0.8s linear infinite;
}

/* ===== HEADER ===== */
header{
position:sticky;
top:0;
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 25px;
background:rgba(17,24,39,0.85);
backdrop-filter:blur(12px);
z-index:1000;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

.logo{
font-size:28px;
font-weight:bold;
color:#38bdf8;
cursor:pointer;
}

nav{display:flex;gap:15px;flex-wrap:wrap}
nav a{color:white;text-decoration:none;opacity:0.8;cursor:pointer;transition:0.3s}
nav a:hover{color:#38bdf8}

.right{display:flex;align-items:center;gap:10px}

.search{
padding:10px;
border-radius:12px;
border:none;
outline:none;
width:220px;
background:#0b1220;
color:white;
}

.cart{
background:linear-gradient(90deg,#38bdf8,#22c55e);
color:black;
padding:10px 15px;
border-radius:12px;
font-weight:bold;
cursor:pointer;
}

/* ===== PAGE SYSTEM ===== */
.page{
display:none;
opacity:0;
transform:translateY(20px);
transition:0.6s ease;
min-height:80vh;
padding:40px 0;
}
.page.active{
display:block;
opacity:1;
transform:translateY(0);
}

/* ===== HERO ===== */
.hero{
height:85vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
padding:20px;
border-radius:20px;
margin:20px;
background:
linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),
url('https://images.unsplash.com/photo-1522199755839-a2bacb67c546?q=80&w=1974');
background-size:cover;
background-position:center;
box-shadow:0 20px 60px rgba(0,0,0,0.6);
}

.hero h1{
font-size:70px;
margin:0;
background:linear-gradient(90deg,#38bdf8,#22c55e);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:glow 3s infinite alternate;
}
@keyframes glow{
from{filter:drop-shadow(0 0 5px #38bdf8);}
to{filter:drop-shadow(0 0 20px #22c55e);}
}

.hero p{max-width:700px;color:#d1d5db;line-height:1.7}

.btn{
padding:14px 28px;
border:none;
border-radius:12px;
background:linear-gradient(90deg,#38bdf8,#22c55e);
color:white;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}
.btn:hover{transform:scale(1.05)}

/* ===== SECTIONS ===== */
.section-title{
text-align:center;
margin:30px 0;
font-size:32px;
color:#38bdf8;
}

/* ===== CATEGORIES ===== */
.categories{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:20px;
}

.cat{
background:rgba(30,41,59,0.7);
backdrop-filter:blur(10px);
padding:30px;
border-radius:18px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
transition:0.3s;
}
.cat:hover{transform:translateY(-10px)}

/* ===== PRODUCTS ===== */
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:20px;
}

.card{
background:rgba(30,41,59,0.85);
backdrop-filter:blur(10px);
padding:15px;
border-radius:18px;
box-shadow:0 15px 40px rgba(0,0,0,0.4);
transition:0.3s;
overflow:hidden;
}
.card:hover{transform:translateY(-10px)}

.card img{
width:100%;
height:160px;
object-fit:cover;
border-radius:12px;
}

.card button{
width:100%;
padding:10px;
border:none;
border-radius:10px;
background:#22c55e;
color:white;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

/* ===== CART ===== */
.cartPanel{
position:fixed;
top:0;
right:-380px;
width:340px;
height:100%;
background:#0b1220;
transition:0.4s;
z-index:2000;
padding:15px;
overflow-y:auto;
}
.cartPanel.active{right:0}

.cartItem{
background:#1e293b;
padding:10px;
margin-bottom:10px;
border-radius:10px;
display:flex;
justify-content:space-between;
}

.cartItem button{
background:red;
color:white;
border:none;
padding:5px 8px;
border-radius:6px;
cursor:pointer;
}

.checkout{
width:100%;
padding:12px;
border:none;
border-radius:12px;
background:linear-gradient(90deg,#38bdf8,#22c55e);
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

footer{
text-align:center;
padding:25px;
background:#0b1220;
color:#94a3b8;
margin-top:40px;
}
</style>
</head>
<body>

<!-- LOADING -->
<div id="loading">
<h1>Mega Store</h1>
<div class="loader"></div>
</div>

<!-- PAGE LOADER -->
<div id="pageLoader"><span></span></div>

<header>
<div class="logo" onclick="showPage('home')">Mega Store</div>

<nav>
<a onclick="showPage('home')">الرئيسية</a>
<a onclick="showPage('products')">المنتجات</a>
<a onclick="showPage('categories')">الأقسام</a>
</nav>

<div class="right">
<input class="search" id="search" placeholder="ابحث...">
<div class="cart" onclick="toggleCart()">🛒 <span id="cartCount">0</span></div>
</div>
</header>

<div class="container">

<!-- HOME -->
<div id="home" class="page active">
<section class="hero">
<h1>متجر إلكتروني ضخم</h1>
<p>تجربة تسوق احترافية مع تصميم حديث وسلس</p>
<button class="btn" onclick="showPage('products')">ابدأ التسوق</button>
</section>
</div>

<!-- CATEGORIES -->
<div id="categories" class="page">
<h2 class="section-title">الأقسام</h2>
<div class="categories">
<div class="cat">📱 جوالات</div>
<div class="cat">💻 لابتوبات</div>
<div class="cat">🎮 ألعاب</div>
<div class="cat">⌚ ساعات</div>
</div>
</div>

<!-- PRODUCTS -->
<div id="products" class="page">
<h2 class="section-title">المنتجات</h2>
<div class="products" id="productList"></div>
</div>

</div>

<!-- CART -->
<div class="cartPanel" id="cartPanel">
<h2>السلة</h2>
<div id="cartItems"></div>
<button class="checkout" onclick="checkout()">الدفع الآن</button>
</div>

<footer>© 2026 Mega Store</footer>

<script>
let cart=[];

const items=[
{name:"iPhone 15",price:3500,img:"https://images.unsplash.com/photo-1592750475338-74b7b21085ab"},
{name:"Laptop HP",price:4200,img:"https://images.unsplash.com/photo-1517336714731-489689fd1ca8"},
{name:"PlayStation 5",price:2200,img:"https://images.unsplash.com/photo-1606813907291-76d6c5b0f0b7"},
{name:"Smart Watch",price:600,img:"https://images.unsplash.com/photo-1523275335684-37898b6baf30"}
];

function showPage(id){
const loader=document.getElementById('pageLoader');
loader.style.display='flex';

setTimeout(()=>{
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.getElementById(id).classList.add('active');
loader.style.display='none';
},500);
}

function renderProducts(){
const list=document.getElementById('productList');
list.innerHTML="";
items.forEach((item,i)=>{
list.innerHTML+=`
<div class='card'>
<img src='${item.img}'/>
<h3>${item.name}</h3>
<p>${item.price} SAR</p>
<button onclick='addToCart(${i})'>إضافة للسلة</button>
</div>
`;
});
}

function addToCart(i){
cart.push(items[i]);
updateCart();
}

function updateCart(){
document.getElementById('cartCount').innerText=cart.length;
const box=document.getElementById('cartItems');
box.innerHTML="";
cart.forEach((item,i)=>{
box.innerHTML+=`
<div class='cartItem'>
<span>${item.name}</span>
<button onclick='removeItem(${i})'>حذف</button>
</div>
`;
});
}

function removeItem(i){
cart.splice(i,1);
updateCart();
}

function toggleCart(){
document.getElementById('cartPanel').classList.toggle('active');
}

function checkout(){
if(cart.length===0){alert('السلة فارغة');return;}
alert('تم الدفع بنجاح (تجريبي)');
cart=[];
updateCart();
}

renderProducts();

window.onload=()=>{
setTimeout(()=>{
document.getElementById('loading').style.display='none';
},1200);
};
</script>

</body>
</html>
